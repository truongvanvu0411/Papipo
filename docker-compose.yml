services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - papipo-postgres:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"
    environment:
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      AI_PROVIDER: ${AI_PROVIDER}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD}
      ADMIN_SEED_NAME: ${ADMIN_SEED_NAME}
      USER_SEED_EMAIL: ${USER_SEED_EMAIL}
      USER_SEED_PASSWORD: ${USER_SEED_PASSWORD}
      USER_SEED_NAME: ${USER_SEED_NAME}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${API_PORT:-4000}:4000"

  admin:
    build:
      context: .
      dockerfile: infra/docker/admin.Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${API_PORT:-4000}
      PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/login').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${ADMIN_PORT:-3000}:3000"

volumes:
  papipo-postgres:
